name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build shared types
        run: npm run build --workspace=packages/types

      - name: Type-check
        run: npm run type-check --workspace=apps/web

      - name: Build
        run: npm run build --workspace=apps/web

  backend:
    name: Backend — install & health check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Start API server
        run: |
          python -m uvicorn apps.api.app.main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
          if ! curl -sf http://localhost:8000/health >/dev/null; then
            echo "API server did not become ready"
            cat /tmp/uvicorn.log
            exit 1
          fi

      - name: Health check smoke test
        run: |
          response=$(curl -sf http://localhost:8000/health)
          echo "Response: $response"
          echo "$response" | grep -q '"status":"ok"'

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true

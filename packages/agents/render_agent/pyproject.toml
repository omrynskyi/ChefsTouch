[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "render-agent"
version = "0.1.0"
description = "Typed canvas render agent for PairCooking"
requires-python = ">=3.9"
dependencies = [
    "langchain-core>=0.3",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.hatch.build.targets.wheel]
packages = ["render_agent"]
